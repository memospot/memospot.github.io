version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    cooldown:
      default-days: 30
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2

  - package-ecosystem: "bun"
    directory: "/"
    cooldown:
      default-days: 30
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0
